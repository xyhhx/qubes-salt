prefs:
  - class: TemplateVM
  - label: black

  - memory: 400
  - maxmem: 2000
  - vcpus: 1

  - provides-network: false

  # - devices-denied: []
  - kernel: "*default*"
  - kernelopts: "*default*"
  # - mac: ""
  - pci-strictreset: true
  - pcidevs: []
  - virt-mode: pvh

  - audiovm: "*default*"
  - guivm: "*default*"
  - netvm: "*default*"

  - default-dispvm: "*default*"
  - default-user: user
  - management-dispvm: "*default*"

  - autostart: false
  - debug: false
  - include-in-backups: false
  - internal: false
  - qrexec-timeout: 120

  # - ip:
  - installed-by-rpm: false
  # - last-backup:

  - flags: []

features:
  - disable:
    - service.hardened_malloc
  - enable:
    - selinux
  - set:
    - menu-items: Alacritty.desktop
    - default-menu-items: Alacritty.desktop


