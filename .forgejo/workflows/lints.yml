on:
  - push

defaults:
  run:
    shell: "sh -e {0}"

jobs:
  test:
    runs-on: codeberg-tiny
    name: Salt Lint
    steps:
      - run: |
            set -xeuo pipefail

            git clone "${GITHUB_SERVER}/${GITHUB_REPOSITORY}" .

      - name: Run salt-lint
        run: scripts/salt-lint.sh
