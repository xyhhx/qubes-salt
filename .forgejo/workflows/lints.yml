on:
  - push

defaults:
  run:
    shell: "sh -e {0}"

jobs:
  salt-lint:
    runs-on: codeberg-tiny
    container: alpine:latest
    name: Salt Lint
    steps:
      - uses: actions/checkout@v4
      - run: scripts/salt-lint.sh

  shellcheck:
    runs-on: codeberg-tiny
    container: alpine:latest
    name: Salt Lint
    steps:
      - uses: actions/checkout@v4
      - run: scripts/shellcheck.sh
